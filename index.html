<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MacTata — macOS Chat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=SF+Mono:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%2329498a"/><stop offset="50%" stop-color="%23531d6e"/><stop offset="100%" stop-color="%23942d57"/></linearGradient></defs><rect width="100" height="100" fill="url(%23g)"/></svg>');
  --menu-h:28px;
  --dock-h:72px;
  --font:'Inter','-apple-system',BlinkMacSystemFont,sans-serif;
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:#1a1a2e}

/* === DESKTOP === */
.desktop{
  position:relative;width:100%;height:100%;
  background:radial-gradient(ellipse at 50% 0%, #2d1b69 0%, #1a1a2e 50%, #0d0d1a 100%);
  overflow:hidden;
}
.wallpaper-overlay{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% 20%, rgba(100,60,200,0.15) 0%, transparent 50%),
              radial-gradient(ellipse at 20% 80%, rgba(200,60,150,0.1) 0%, transparent 50%);
  pointer-events:none;
}

/* === MENU BAR === */
.menubar{
  position:fixed;top:0;left:0;right:0;height:var(--menu-h);z-index:1000;
  background:rgba(30,30,46,0.75);backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;padding:0 12px;gap:16px;
  font-size:13px;color:rgba(255,255,255,0.9);user-select:none;
}
.menubar .apple{font-size:16px;font-weight:600;padding:0 4px;cursor:default}
.menubar .menu-item{padding:0 6px;cursor:default;opacity:0.8;transition:opacity 0.15s}
.menubar .menu-item:hover{opacity:1}
.menubar .right{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:12px;opacity:0.8}
.menubar .battery{font-size:14px}
.menubar .battery .bolt{color:#ffd60a}

/* === DOCK === */
.dock-wrapper{
  position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:1000;
  padding:4px 8px;border-radius:14px;
  background:rgba(30,30,46,0.6);backdrop-filter:blur(30px) saturate(1.5);
  -webkit-backdrop-filter:blur(30px) saturate(1.5);
  border:1px solid rgba(255,255,255,0.08);
  display:flex;gap:2px;align-items:flex-end;
}
.dock-item{
  width:52px;height:52px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;cursor:pointer;transition:all 0.15s;
  background:rgba(255,255,255,0.05);position:relative;
  border:1px solid transparent;
}
.dock-item:hover{
  transform:scale(1.15) translateY(-4px);
  background:rgba(255,255,255,0.1);
  border-color:rgba(255,255,255,0.1);
}
.dock-item.active::after{
  content:'';position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.5);
}
.dock-item .badge{
  position:absolute;top:-4px;right:-4px;
  background:#ff453a;color:#fff;font-size:10px;
  width:18px;height:18px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
}
.dock-sep{width:1px;height:36px;background:rgba(255,255,255,0.1);margin:0 4px;align-self:center}
.dock-trash{opacity:0.5;font-size:20px;width:44px;height:44px}

/* === WINDOW === */
.window{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(720px,94vw);height:min(560px,80vh);
  border-radius:12px;overflow:hidden;
  background:rgba(30,30,46,0.92);backdrop-filter:blur(40px) saturate(1.3);
  -webkit-backdrop-filter:blur(40px) saturate(1.3);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 24px 80px rgba(0,0,0,0.6),0 0 0 0.5px rgba(255,255,255,0.05);
  display:flex;flex-direction:column;
  animation:windowOpen 0.35s cubic-bezier(0.22,1,0.36,1);
}
@keyframes windowOpen{
  from{opacity:0;transform:translate(-50%,-50%) scale(0.92)}
  to{opacity:1;transform:translate(-50%,-50%) scale(1)}
}

/* Title bar */
.titlebar{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;cursor:default;
  flex-shrink:0;
}
.traffic-lights{display:flex;gap:7px;flex-shrink:0}
.traffic-lights span{
  width:12px;height:12px;border-radius:50%;transition:opacity 0.15s;
  cursor:pointer;
}
.tl-close{background:#ff5f57;border:0.5px solid rgba(0,0,0,0.15)}
.tl-min{background:#febc2e;border:0.5px solid rgba(0,0,0,0.15)}
.tl-max{background:#28c840;border:0.5px solid rgba(0,0,0,0.15)}
.traffic-lights span:hover{filter:brightness(1.2)}
.window-title{flex:1;text-align:center;font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);margin-right:48px}

/* === CHAT AREA === */
.chat-area{
  flex:1;overflow-y:auto;padding:14px 16px;
  scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{width:5px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

/* Messages */
.msg{margin-bottom:10px;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

.msg-row{display:flex;gap:8px;align-items:flex-start}
.msg-avatar{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.msg-avatar.tata{background:linear-gradient(135deg,#667eea,#764ba2)}
.msg-avatar.you{background:linear-gradient(135deg,#667eea,#28c840)}
.msg-body{flex:1;min-width:0}
.msg-name{font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);margin-bottom:2px}
.msg-name .time{margin-left:6px;font-weight:400;color:rgba(255,255,255,0.2)}
.msg-text{
  font-size:13.5px;line-height:1.55;color:rgba(255,255,255,0.88);
  white-space:pre-wrap;word-break:break-word;
}
.msg-text.code{
  background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.06);
  border-radius:8px;padding:10px 12px;margin:6px 0;
  font-family:'SF Mono',monospace;font-size:12.5px;line-height:1.5;
  overflow-x:auto;
}
.msg-text code{
  background:rgba(255,255,255,0.06);padding:1px 5px;border-radius:4px;
  font-family:'SF Mono',monospace;font-size:12.5px;
}
.msg.is-me .msg-row{flex-direction:row-reverse}
.msg.is-me .msg-name{text-align:right}
.msg.is-me .msg-text{text-align:right;color:rgba(255,255,255,0.75)}
.msg.typing .cursor{
  display:inline-block;width:7px;height:14px;
  background:rgba(255,255,255,0.6);animation:blink 1s step-end infinite;
  vertical-align:text-bottom;border-radius:1px;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* === INPUT === */
.input-area{
  flex-shrink:0;padding:8px 14px 12px;border-top:1px solid rgba(255,255,255,0.06);
}
.input-wrap{
  display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;padding:6px 10px;
  transition:border-color 0.2s;
}
.input-wrap:focus-within{border-color:rgba(102,126,234,0.5)}
.input-wrap input{
  flex:1;background:transparent;border:none;outline:none;
  color:rgba(255,255,255,0.85);font-size:13.5px;font-family:var(--font);
  line-height:1.4;
}
.input-wrap input::placeholder{color:rgba(255,255,255,0.2)}
.input-wrap .send-btn{
  width:28px;height:28px;border-radius:7px;border:none;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;flex-shrink:0;
}
.input-wrap .send-btn:hover{filter:brightness(1.15);transform:scale(1.05)}
.input-wrap .send-btn:disabled{opacity:0.3;cursor:default}

/* === CONNECTED STATUS === */
.conn-status{
  position:fixed;top:32px;right:12px;z-index:999;
  display:flex;align-items:center;gap:4px;
  font-size:10px;color:rgba(255,255,255,0.3);padding:2px 8px;
  border-radius:4px;background:rgba(0,0,0,0.2);
}
.conn-status .dot{width:5px;height:5px;border-radius:50%}
.conn-status .dot.on{background:#30d158}
.conn-status .dot.off{background:#ff453a}

/* === MACBOOK FRAME (on larger screens) === */
@media(min-width:768px){
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;
    background:
      linear-gradient(135deg, rgba(134,65,134,0.03) 0%, transparent 50%),
      linear-gradient(225deg, rgba(64,130,234,0.03) 0%, transparent 50%);
  }
}
</style>
</head>
<body>
<div class="desktop">
  <div class="wallpaper-overlay"></div>

  <!-- Menu Bar -->
  <div class="menubar">
    <span class="apple"></span>
    <span class="menu-item" style="font-weight:600">Tata Chat</span>
    <span class="menu-item">File</span>
    <span class="menu-item">Edit</span>
    <span class="menu-item">View</span>
    <span class="menu-item">Window</span>
    <span class="menu-item">Help</span>
    <div class="right">
      <span class="battery"><span class="bolt">◆</span> 82%</span>
      <span class="wifi">◉</span>
      <span class="clock" id="clock">12:00</span>
    </div>
  </div>

  <!-- Connection status -->
  <div class="conn-status">
    <span class="dot off" id="connDot"></span>
    <span id="connLabel">connecting</span>
  </div>

  <!-- Chat Window -->
  <div class="window">
    <div class="titlebar">
      <div class="traffic-lights">
        <span class="tl-close"></span>
        <span class="tl-min"></span>
        <span class="tl-max"></span>
      </div>
      <span class="window-title">🐱 Tata Chat</span>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-area">
      <div class="input-wrap">
        <input type="text" id="input" placeholder="给 Tata 发消息..." autofocus>
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <!-- Dock -->
  <div class="dock-wrapper">
    <div class="dock-item active">🐱</div>
    <div class="dock-item" title="Terminal"></div>
    <div class="dock-item" title="VS Code">{ }</div>
    <div class="dock-item" title="Safari">🌐</div>
    <div class="dock-item" title="Notes">📝</div>
    <div class="dock-sep"></div>
    <div class="dock-item dock-trash" title="Trash">🗑</div>
  </div>
</div>

<script>
// === Clock ===
function updateClock(){
  const n=new Date();const h=n.getHours().toString().padStart(2,'0');
  const m=n.getMinutes().toString().padStart(2,'0');
  const d=n.toLocaleDateString('zh-CN',{month:'short',day:'numeric',weekday:'short'});
  document.getElementById('clock').textContent=`${h}:${m}  ${d}`;
}
updateClock();setInterval(updateClock,10000);

// === Chat ===
const chatArea=document.getElementById('chatArea');
const input=document.getElementById('input');
const sendBtn=document.getElementById('sendBtn');
const connDot=document.getElementById('connDot');
const connLabel=document.getElementById('connLabel');

const API_BASE = 'https://228ad1536a6328.lhr.life';
let typingDiv=null;let connected=false;let sentCount=0;

function addMsg(name,avatar,text,cls=''){
  const div=document.createElement('div');
  div.className='msg'+(cls?' '+cls:'');
  const time=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  const isCode=text.startsWith('```')||text.startsWith('  ')||text.includes('\n  ');
  const bodyCls=isCode?'msg-text code':'msg-text';
  div.innerHTML=`
    <div class="msg-row">
      <div class="msg-avatar ${name==='Tata'?'tata':'you'}">${avatar}</div>
      <div class="msg-body">
        <div class="msg-name">${name} <span class="time">${time}</span></div>
        <div class="${bodyCls}">${text.replace(/\n/g,'<br>')}</div>
      </div>
    </div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop=chatArea.scrollHeight;
  return div;
}

function addTyping(){
  const div=document.createElement('div');
  div.className='msg typing';
  div.innerHTML=`
    <div class="msg-row">
      <div class="msg-avatar tata">🐱</div>
      <div class="msg-body">
        <div class="msg-name">Tata <span class="time">·</span></div>
        <div class="msg-text"><span class="cursor"></span></div>
      </div>
    </div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop=chatArea.scrollHeight;
  return div;
}

function removeTyping(d){if(d)d.remove()}
function updateTyping(d,t){
  if(d){d.querySelector('.msg-text').innerHTML=t.replace(/\n/g,'<br>')+'<span class="cursor"></span>';
  chatArea.scrollTop=chatArea.scrollHeight}
}

function setConn(ok){
  connected=ok;
  connDot.className='dot '+(ok?'on':'off');
  connLabel.textContent=ok?'connected':'disconnected';
  sendBtn.disabled=!ok;
}

// Send message via HTTP POST
async function sendViaAPI(text){
  try{
    const res=await fetch(API_BASE+'/api/chat', {
      method:'POST',
      mode:'cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text})
    });
    const data=await res.json();
    return data.reply || null;
  }catch(e){
    return null;
  }
}

async function send(text){
  if(!text.trim())return;
  if(!connected){addMsg('System','⚙','⚠ Not connected to server');return}
  addMsg('You','▶',text.trim());
  input.value='';
  if(typingDiv)removeTyping(typingDiv);
  typingDiv=addTyping();
  
  let dots=0;
  typingDiv._t=setInterval(()=>{
    dots=(dots+1)%4;const d='·'.repeat(dots);
    if(typingDiv)updateTyping(typingDiv,d||'·');
  },600);
  
  const reply=await sendViaAPI(text);
  clearInterval(typingDiv._t);
  removeTyping(typingDiv);typingDiv=null;
  
  if(reply){
    addMsg('Tata','🐱',reply);
  }else{
    addMsg('System','⚙','⚠ Server timeout or error');
  }
}

// Input handlers
input.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    e.preventDefault();send(input.value);
  }
});
sendBtn.addEventListener('click',()=>send(input.value));

// Init
addMsg('Tata','🐱',
  'Hi! 我是 Tata 🐱\n\n欢迎来到你的 Mac 桌面聊天室。\n随便说点什么开始吧！\n\n`/help` 查看命令');
function connect(){
  // Check if server is reachable
  fetch(API_BASE+'/api/health')
    .then(r=>r.json()).then(d=>{
      setConn(d.connected);
    }).catch(()=>setConn(false));
  // Recheck every 30s
  setInterval(()=>{
    fetch(API_BASE+'/api/health')
      .then(r=>r.json()).then(d=>setConn(d.connected))
      .catch(()=>setConn(false));
  }, 30000);
}

connect();
</script>
</body>
</html>
